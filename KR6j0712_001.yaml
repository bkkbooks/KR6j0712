body:
  text: 天台比丘靈耀全彰述經文分三第一卷一序二一通序六一信成就二聞成就三時成就四主成就五處成就六衆成就三一聲聞衆五一明類與二示數千三顯位皆四歎德佛五列名其二緣覺衆復三菩薩衆屬二別序二一王臣營齋二一佛應王宮時二僧應臣舍城二阿難被攝二一獨行無供二一阿難他行惟二獨還無供既二乞食遭攝二一乞食運懷三一俯運等慈即二仰遵呵誡阿三肅儀如法經二經歷遭攝二一攝入淫席爾二如來慈救二一在宮密知如二歸園演法齋三文殊護歸敕二正宗三流通一序分竟二正宗二一正觀總無明心以明修證二一正明修證三一約破顯以開圓解二一對阿難雙約次不次明三止觀三一阿難悔請阿二大衆願聞於三如來演説二一酬請開示三一寄從假入空酬奢摩以助圓理二一審問心見二一審問發心二一問佛二答阿二詳審心見三一直示常心佛二勸進直心汝三正審心見二一審心見二一問阿二答阿二審心目之處二一問佛二答阿二破妄顯真二一約三摩提觀假七一破在內三一以現事比例三一定內外佛二定先後阿三定因由阿二示最初方便爾三正破斥在內二一立例按定佛二循例正破阿二破在外二一立計三一因破轉計阿二立喻例顯所三結意請正是二正破二一立例按定佛二循例破執佛三破潛根三一立計二一因破計生阿二因徵敘計佛二逐破二一立例按定佛二循例破執佛三結破是四破內外二一立計阿二佛破二一雙約對不對破二一雙定佛二雙破若二單約內對破二一立內對若二破內對二一正破合二縱破見三結破是五破隨合三一立計阿二佛破二一牒執佛二正破二一直明無體是二委破有體二一約內外出入破二一破若二救二一救阿二破佛二約一多遍局破二一定阿二破若三結破是六破中間三一立計阿二佛破二一約身處破二一按定佛二推破二一破在身若二破在處若二約根塵破二一救阿二破佛三結破是七破無著三一立計阿二佛破佛三結破是二約奢摩他顯真二寄從空出假酬三摩以歸圓理三明中道了義酬禪那以顯圓理二聞法領悟二對滿慈更審除細惑明如來藏二示正助以修圓行三明迷悟以證圓位二結顯經名二約別能招報心以明修證二約奢摩他顯真二一請奢摩他爾二演奢摩他二一現瑞爾二聲益二一示二種根本二一標示佛二正明云二明奢摩他路二一雙徵心目阿二斥妄辨真二一斥妄心三一咄破佛二驚問阿三顯示佛二辨真心二一疑問阿二開示三一番圓別進否二第二卷一略示圓心二一略示惟心二一顯惟心爾二舉物況阿二明妄無體二一斥妄二一正斥二一明無體若二敕揣摩我二默領即二結過佛二別顯見性二一哀請阿二開示二一現瑞許説二一現瑞即二許説佛二正辨見性三一見性是心三一徵定拳見二一問阿二答阿二復例拳見三一問佛二答阿三破佛三會見歸心四一計諸盲立難阿二以二黑相較佛三復順問而答如四正破根顯見阿二見性不變二一默請阿二正示三一徵名驗悟三一問爾二答時三印可佛二現相證成二一以客塵義令見性脫塵即二以客塵義令見性脫根如三結會責失於三見性常住二一請二一慶喜密請爾二匿王顯問時二答二一開示二一身有變遷佛二性無生滅二一審問真性佛二如來開示佛二領悟王二番圓別進否二一進圓二一暢明圓理二一攝前致問阿二正為開示三一喻顯倒正即二被問茫然隨三正示圓理二一正示色心不二佛二兼示依正不二晦二當機不悟二一呈疑阿二佛斥二一遣所緣之教佛二破能緣之心二否別二一見性無還二一承責咨請阿二示以無還三一揀示許説佛二正辨境見二一明境可還二一示八境二一示境阿二明還阿二明該攝則二明見無還汝三指心責迷則二見性非物二一問阿二答二一正明真見非物二一示見量佛二示非物二一勸檢自他阿二正檢自他二一明他阿二明自阿二展轉破見是物三一示見非物若二約物我結過又三結責當機阿三番圓別進否二一明圓證三一圓證超觀大觀小二一問阿二答二一正破疑二一正破佛二反破若二明圓理一二圓證出是見非見二一問阿二答二一破執三一如來破執二一總破見在我前佛二別破是見非見二一物無是見佛二物無非見佛二大衆茫然於三如來安慰如二會通二一騰疑咨請是二正為會通二一正明絶待佛二引例釋成二一指人引例二一指人問文二會意答如二説法釋成二一離是非佛二明得失是三圓證離因緣自然四一見性離自然二一疑自然阿二破自然二一斥趣總責佛二歷境別破阿二見性離因緣二一疑因緣二破因緣三明正體當四總結責汝二明別理三一辨真俗二諦二一問二答二一判二諦佛二明二諦三一先破世諦阿二明第一義諦是三然斥勸進汝二破同別妄見二一牒前説疑請阿二約二見開示二一呵誡許宣爾二推因正説二一示輪回由妄阿二約二見廣釋二一正明二一別業妄見三一指人云二正破二一破即於二破離復三結顯是二同分妄見云二例合二一總標阿二別示三一別中法喻三一喻阿二法例三結是二進退合明阿三同分合法二一以起妄正合例二以歸真顯示若三破和合非合二一責迷阿二徵破二一破和合疑二一標責阿二正破二一破和二一定則二破二一正破明若二例餘境彼二破合二一定復二破二一正破明二一正破若二轉破若二例餘境彼二破非和合二一轉計阿二佛破二一責疑佛二正破二一破非和二一定吾二破二一正破非明二一約邊畔指問若二顯不和非畔阿二例破餘境彼二破非合二一定又二破二一正破非合若二例破餘境彼二寄從空出假酬三摩以歸圓理二一總示